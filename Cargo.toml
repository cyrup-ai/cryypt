[workspace]
resolver = "3"
members = [
    "cipher",        # Symmetric encryption
    "common",        # Common infrastructure
    "compression",   # Data compression
    "cryypt",        # Main unified crate
    "vault",  # Secure storage
    "workspace-hack",   # Workspace hack
    "examples",      # Examples
    "hashing",       # Hash functions
    "jwt",           # JSON Web Tokens
    "key",           # Key management
    "map_macro",     # Ergonomic map/set macros
    "pqcrypto",      # Post-quantum cryptography
    "quic",          # QUIC protocol crypto
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Cyrup AI <dev@cyrup.ai>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/cyrup-ai/crypt"
keywords = ["encryption", "cryptography", "postquant", "cipher", "security"]
categories = ["cryptography", "authentication"]
rust-version = "1.88"

[workspace.lints]
clippy.all = "warn"
clippy.pedantic = "warn"
